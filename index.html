<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="" />
  <link rel="stylesheet" href="/style.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cubic Solver</title>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/main.ts"></script>
  <div class="calculator-container">
    <h1 class="title">Cubic Solver</h1>
    <form id="cubic-form">
      <div class="input-container">
        <label for="a"> a-value:</label>
        <input type="number" id="a" name="a" required>
      </div>
      <div class="input-container">
        <label for="b"> b-value:</label>
        <input type="number" id="b" name="b" required>
      </div>
      <div class="input-container">
        <label for="c"> c-value:</label>
        <input type="number" id="c" name="c" required>
      </div>
      <div class="input-container">
        <label for="d"> d-value:</label>
        <input type="number" id="d" name="d" required>
      </div>
      <div class="input-container">
        <input type="submit" id="solve-button" name="solve-button" value="Solve Cubic" />
      </div>
    </form>
  </div>
  <div id="output-container" class="output-container" hidden>
    <div class="results-container">
      <h2 id="equation"></h2>
      <table id="results-table">
        <tr>
          <td>p</td>
          <td id="p">0</td>
        </tr>
        <tr>
          <td>q</td>
          <td id="q">0</td>
        </tr>
        <tr>
          <td>Discriminant</td>
          <td id="discriminant">0</td>
        </tr>
        <tr class="header-row">
          <th>Value</th>
          <th>x</th>
          <th>y</th>
        </tr>
        <tr>
          <td>Root 1</td>
          <td id="root-one">0</td>
          <td>0</td>
        </tr>
        <tr>
          <td>Root 2</td>
          <td id="root-two">0</td>
          <td>0</td>
        </tr>
        <tr>
          <td>Root 3</td>
          <td id="root-three">0</td>
          <td>0</td>
        </tr>
      </table>
    </div>
    <div class="graph-container">
      <canvas id="graph" width="600" height="400"></canvas>
    </div>
  </div>
</body>

</html>
